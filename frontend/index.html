<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Career Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">🎓 CareerTrack</div>
        <button id="darkModeBtn">🌙</button>
    </nav>

    <div class="container">

        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h2 id="totalStudents">0</h2>
                    <p>Total Students</p>
                </div>
            </div>
            <div class="stat-card placed">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <h2 id="placedStudents">0</h2>
                    <p>Placed</p>
                </div>
            </div>
            <div class="stat-card not-placed">
                <div class="stat-icon">⏳</div>
                <div class="stat-info">
                    <h2 id="notPlacedStudents">0</h2>
                    <p>Not Placed</p>
                </div>
            </div>
            <div class="stat-card percent">
                <div class="stat-icon">📈</div>
                <div class="stat-info">
                    <h2 id="percentageCard">0%</h2>
                    <p>Placement Rate</p>
                </div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-header">
                <span>Placement Progress</span>
                <span id="percentage">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress"></div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>Placement Overview</h3>
                <div class="chart-wrapper">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>Top Skills</h3>
                <div class="chart-wrapper">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bottom-grid">

            <!-- Left Column: Form + Export + Summary -->
            <div class="left-column">
                <div class="form-card">
                    <h3>Add Student</h3>
                    <div class="form-group">
                        <input type="text" id="name" placeholder="Student Name">
                    </div>
                    <div class="form-group">
                        <input type="text" id="skill" placeholder="Skill (e.g. React, Python)">
                    </div>
                    <div class="form-group">
                        <select id="status">
                            <option value="Placed">✅ Placed</option>
                            <option value="Not Placed">⏳ Not Placed</option>
                        </select>
                    </div>
                    <button class="btn-add" onclick="addStudent()">+ Add Student</button>

                    <div class="export-buttons">
                        <button class="btn-excel" onclick="exportExcel()">📊 Export Excel</button>
                        <button class="btn-pdf" onclick="exportPDF()">📄 Export PDF</button>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="summary-box">
                    <h4>Quick Stats</h4>
                    <div class="summary-item">
                        <span>Total Students</span>
                        <span id="s-total">0</span>
                    </div>
                    <div class="summary-item placed-stat">
                        <span>✅ Placed</span>
                        <span id="s-placed">0</span>
                    </div>
                    <div class="summary-item not-placed-stat">
                        <span>⏳ Not Placed</span>
                        <span id="s-notplaced">0</span>
                    </div>
                    <div class="summary-item rate-stat">
                        <span>📈 Success Rate</span>
                        <span id="s-rate">0%</span>
                    </div>
                </div>
            </div>

            <!-- Right Column: Table -->
            <div class="table-card">
                <div class="table-header">
                    <h3>Students</h3>
                    <input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchStudent()">
                </div>

                <div class="filter-bar">
                    <select id="filterStatus" onchange="applyFilters()">
                        <option value="All">All Status</option>
                        <option value="Placed">✅ Placed</option>
                        <option value="Not Placed">⏳ Not Placed</option>
                    </select>
                    <select id="filterSkill" onchange="applyFilters()">
                        <option value="All">All Skills</option>
                    </select>
                    <select id="sortBy" onchange="applyFilters()">
                        <option value="default">Sort By</option>
                        <option value="name-asc">Name A → Z</option>
                        <option value="name-desc">Name Z → A</option>
                        <option value="placed-first">Placed First</option>
                        <option value="not-placed-first">Not Placed First</option>
                    </select>
                    <button onclick="resetFilters()">✖ Reset</button>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Skill</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentList"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
